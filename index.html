<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="Calming Crosswords — Travel the world one word at a time. Swipe letters to solve peaceful crossword puzzles inspired by destinations worldwide." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calming CW" />

  <!-- SEO -->
  <title>Calming Crosswords — Word Puzzle Game</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/crossword-grid.css" />
  <link rel="stylesheet" href="css/letter-wheel.css" />
  <link rel="stylesheet" href="css/ui.css" />

  <!-- Pack Themes -->
  <link rel="stylesheet" href="css/themes/theme-mediterranean.css" />
  <link rel="stylesheet" href="css/themes/theme-asia-pacific.css" />
  <link rel="stylesheet" href="css/themes/theme-americas.css" />
  <link rel="stylesheet" href="css/themes/theme-africa.css" />
  <link rel="stylesheet" href="css/themes/theme-europe.css" />
  <link rel="stylesheet" href="css/themes/theme-oceania.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-title">✦ Calming Crosswords</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- App Shell -->
  <div id="app">

    <!-- Animated Background -->
    <div id="bg-layer" aria-hidden="true"></div>

    <!-- Screen Container -->
    <div id="screen-container">

      <!-- Home Screen -->
      <section id="screen-home"   class="screen" role="main" aria-label="Home"></section>

      <!-- Level Select Screen -->
      <section id="screen-levels" class="screen hidden" role="main" aria-label="Destinations"></section>

      <!-- Game Screen -->
      <section id="screen-game"   class="screen hidden" role="main" aria-label="Puzzle"></section>

      <!-- Result Screen -->
      <section id="screen-result" class="screen hidden" role="main" aria-label="Result"></section>

    </div>

    <!-- Global Overlays -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  </div>

  <!-- App Entry -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
